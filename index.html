<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The List</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<!-- PWA: install to home screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<!-- iOS specifics (iOS doesn't fully read the manifest, needs these) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="The List">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Allow notch/safe-area so the app can paint edge-to-edge on phones -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --faint: #a3a3a3;
    --hairline: #e7e5e4;
    --subtle: #f5f4f2;
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #141414;
    --ink: #fafafa;
    --muted: #a3a3a3;
    --faint: #6b6b6b;
    --hairline: #262626;
    --subtle: #1c1c1c;
  }
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .container {
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 200;
    font-size: 16px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--ink);
    padding: calc(4rem + env(safe-area-inset-top)) calc(1.25rem + env(safe-area-inset-right)) calc(6rem + env(safe-area-inset-bottom)) calc(1.25rem + env(safe-area-inset-left));
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* When launched from the home screen on iOS, give content a bit more
     breathing room at the top since there's no browser chrome. */
  @media (display-mode: standalone) {
    body { padding-top: calc(2.5rem + env(safe-area-inset-top)); }
  }
  .container {
    position: relative;
    max-width: 580px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 24px;
    padding: 3.5rem 3rem;
  }
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .theme-toggle:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .theme-toggle svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  @media (max-width: 520px) {
    body { padding: 2rem 0.75rem 4rem; }
    .container { padding: 2.25rem 1.5rem; border-radius: 20px; }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  h1 {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 2.75rem;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }
  .subtitle {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .progress {
    margin: 0 0 2.75rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.65rem;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .section {
    margin-bottom: 2.25rem;
  }
  .section:last-of-type {
    margin-bottom: 0;
  }
  .section-header {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: -0.005em;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    padding: 0.7rem 0.5rem;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.18s ease;
  }
  .task:hover {
    background: var(--subtle);
  }

  .checkbox {
    position: relative;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 0.15rem;
  }
  .task input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .checkbox-visual {
    position: absolute;
    inset: 0;
    border: 1px solid var(--faint);
    border-radius: 50%;
    background: var(--surface);
    transition: all 0.2s ease;
  }
  .checkbox-visual::after {
    content: "";
    position: absolute;
    top: 4px;
    left: 3px;
    width: 10px;
    height: 5px;
    border-left: 1.5px solid var(--surface);
    border-bottom: 1.5px solid var(--surface);
    transform: rotate(-45deg) scale(0);
    transition: transform 0.2s ease;
  }
  .task:hover .checkbox-visual {
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual {
    background: var(--ink);
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual::after {
    transform: rotate(-45deg) scale(1);
  }

  .task-text {
    flex: 1;
    font-weight: 300;
    font-size: 0.975rem;
    color: var(--ink);
    line-height: 1.45;
    transition: color 0.2s ease;
  }
  .task.done .task-text {
    color: var(--faint);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    text-decoration-color: var(--faint);
  }

  .note {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--muted);
    margin-left: 0.35rem;
    font-weight: 300;
  }

  .task-text a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: var(--muted);
    font-weight: 400;
    transition: text-decoration-color 0.15s ease;
  }
  .task-text a:hover {
    text-decoration-color: var(--ink);
  }
  .task.done .task-text a {
    color: var(--faint);
    text-decoration-color: var(--faint);
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  .reset-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .reset-btn:hover {
    color: var(--ink);
  }
  .account-row {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--faint);
  }
  .account-row .account-email {
    color: var(--muted);
  }
  .account-row .account-sep {
    margin: 0 0.6rem;
    opacity: 0.4;
  }
  .account-row .signout-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    padding: 0;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .account-row .signout-btn:hover {
    color: var(--ink);
  }

  /* ─── Sign-in screen ─── */
  .signin-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    z-index: 200;
  }
  .signin-screen.open {
    display: flex;
  }
  .signin-card {
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .signin-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 3rem;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 0.75rem;
  }
  .signin-subtitle {
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--faint);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .signin-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }
  .signin-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hairline);
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 300;
    padding: 0.6rem 0;
    outline: none;
    text-align: center;
    transition: border-color 0.2s ease;
  }
  .signin-input:focus {
    border-bottom-color: var(--ink);
  }
  .signin-input::placeholder {
    color: var(--faint);
    font-style: italic;
  }
  .signin-submit {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 0.85rem 1.5rem;
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }
  .signin-submit:hover:not(:disabled) {
    opacity: 0.85;
  }
  .signin-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .signin-msg {
    margin-top: 1.25rem;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--muted);
    min-height: 1.2em;
  }
  .signin-msg.error {
    color: #c0392b;
  }
  :root[data-theme="dark"] .signin-msg.error {
    color: #e67e68;
  }

  /* ─── Toast ─── */
  .toast-stack {
    position: fixed;
    bottom: calc(2rem + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
    pointer-events: none;
    width: max-content;
    max-width: calc(100vw - 2rem);
  }
  .toast {
    background: var(--ink);
    color: var(--bg);
    padding: 0.7rem 1.25rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: auto;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.error {
    background: #c0392b;
    color: #fff;
  }

  /* ─── Sync indicator ─── */
  .sync-indicator {
    position: absolute;
    top: 1.25rem;
    left: 1.25rem;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--faint);
    opacity: 0;
    transition: opacity 0.3s ease, background 0.3s ease;
  }
  .sync-indicator.active {
    opacity: 0.6;
    background: var(--muted);
    animation: syncPulse 1s ease-in-out infinite;
  }
  .sync-indicator.offline {
    opacity: 1;
    background: #c0392b;
  }
  @keyframes syncPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* Hide app body until auth is resolved to avoid flash */
  #appRoot {
    visibility: hidden;
  }
  #appRoot.ready {
    visibility: visible;
  }

  /* ─── Drag handle ─── */
  .drag-handle {
    color: var(--faint);
    cursor: grab;
    padding: 0 0.5rem 0 0;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease;
    font-size: 0.85rem;
    line-height: 1;
    letter-spacing: -0.1em;
    user-select: none;
    flex-shrink: 0;
    align-self: center;
  }
  .task:hover .drag-handle {
    opacity: 1;
  }
  .drag-handle:active {
    cursor: grabbing;
  }
  .task.dragging {
    opacity: 0.4;
  }
  .task.drop-above {
    box-shadow: inset 0 2px 0 0 var(--ink);
  }
  .task.drop-below {
    box-shadow: inset 0 -2px 0 0 var(--ink);
  }

  /* ─── Task delete (hover) ─── */
  .task-delete {
    opacity: 0;
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 0.25rem;
    transition: opacity 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .task:hover .task-delete {
    opacity: 1;
  }
  .task-delete:hover {
    color: var(--ink);
  }

  /* ─── Add task form ─── */
  .add-task {
    margin-top: 3rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--hairline);
  }
  .add-task-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 300;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--hairline);
    transition: border-color 0.2s ease;
  }
  .add-task-input:focus {
    border-bottom-color: var(--ink);
  }
  .add-task-input::placeholder {
    color: var(--faint);
    font-style: italic;
  }
  .add-task-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .add-task-sections {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .section-chip {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 0.3rem 0.75rem;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .section-chip:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .section-chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }
  .section-chip.new {
    border-style: dashed;
  }
  .add-task-submit {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 0.35rem 1.1rem;
    color: var(--faint);
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .add-task-submit:not(:disabled):hover {
    color: var(--ink);
    border-color: var(--ink);
  }
  .add-task-submit:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .add-task-new-section {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.35rem 0;
    margin-top: 0.75rem;
    border-bottom: 1px solid var(--hairline);
  }
  .add-task-new-section:focus {
    border-bottom-color: var(--ink);
  }
  .add-task-new-section::placeholder {
    color: var(--faint);
    font-style: italic;
  }

  /* ─── Archive modal ─── */
  .archive-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .archive-overlay.open {
    display: flex;
    opacity: 1;
  }
  .archive-modal {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .archive-head {
    padding: 2rem 2.25rem 1.25rem;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .archive-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.75rem;
    color: var(--ink);
    line-height: 1;
  }
  .archive-summary {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
    margin-top: 0.5rem;
  }
  .archive-close {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: var(--faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
  }
  .archive-close:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .archive-search {
    margin: 0 2.25rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--hairline);
  }
  .archive-search input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.25rem 0;
  }
  .archive-search input::placeholder {
    color: var(--faint);
  }
  .archive-body {
    overflow-y: auto;
    padding: 0.5rem 2.25rem 1.5rem;
    flex: 1;
  }
  .archive-day {
    margin-top: 1.5rem;
  }
  .archive-day:first-child {
    margin-top: 1rem;
  }
  .archive-day-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .archive-entry {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--hairline);
    color: var(--muted);
    font-weight: 300;
    font-size: 0.92rem;
  }
  .archive-entry:last-child {
    border-bottom: none;
  }
  .archive-entry-text {
    flex: 1;
    line-height: 1.4;
  }
  .archive-entry-section {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faint);
    flex-shrink: 0;
    align-self: center;
  }
  .archive-empty {
    padding: 3rem 0;
    text-align: center;
    color: var(--faint);
    font-weight: 300;
    font-size: 0.9rem;
  }
  .archive-foot {
    padding: 1rem 2.25rem 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .archive-foot-count {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
  }
  .archive-actions {
    display: flex;
    gap: 1.25rem;
  }
  .archive-action {
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0;
    transition: color 0.2s ease;
  }
  .archive-action:hover {
    color: var(--ink);
  }
</style>
</head>
<body>

<!-- Sign-in screen: shown when no Supabase session is active. -->

<!-- Toast stack (global, lives outside #appRoot so it can render during auth/loading) -->
<div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

<div id="appRoot">
<div class="container">
  <div class="sync-indicator" id="syncIndicator" title="Sync status" aria-hidden="true"></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">

    </svg>

  <div class="add-task">

    <div class="add-task-controls">

<div class="archive-overlay" id="archiveOverlay" onclick="if(event.target===this) closeArchive()">

      <div>
        <div class="archive-title" id="archiveTitle">History</div>
        <div class="archive-summary" id="archiveSummary">&nbsp;</div>
      </div>
      <button class="archive-close" onclick="closeArchive()" aria-label="Close">&times;</button>
    </div>
    <div class="archive-search">
      <input type="text" id="archiveSearch" placeholder="Search completed tasks…" />
    </div>

    <div class="archive-foot">
      <div class="archive-foot-count" id="archiveCount">0 entries</div>
      <div class="archive-actions">
        <button class="archive-action" onclick="exportArchive()">Export JSON</button>
        <button class="archive-action" onclick="clearArchive()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

/* ─────────────────────────────────────────────────────────────
   The List — Supabase-backed data layer
   ─────────────────────────────────────────────────────────────
   Source of truth: Supabase (thelist_tasks, thelist_archive).
   In-memory `state` mirrors the DB and drives rendering.
   localStorage is a read-through cache so the app paints fast
   and shows stale-but-useful data when offline.

   Mutation flow (add/check/delete/reorder):
     1. Update in-memory state + re-render immediately (optimistic)
     2. Write to Supabase
     3. On failure: revert and toast

   Cross-device sync: "refetch on focus." When the page becomes
   visible, pull fresh data. Simpler than realtime subscriptions
   and works fine for a single-user app.

   WHAT BREAKS IF: the anon key or URL in config.js is wrong →
   silent auth failures. RLS is disabled → data leaks across users.
   Magic-link redirect URL isn't whitelisted in Supabase Auth →
   the sign-in email link won't authenticate.

   Storage keys:
     TASKS_CACHE / ARCHIVE_CACHE — local snapshots for offline
     THEME_KEY — light/dark preference
     MIGRATION_FLAG — set once after legacy→cloud upload
   ───────────────────────────────────────────────────────────── */

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const THEME_KEY = 'clay-todo-theme';
const TASKS_CACHE = 'thelist-cache-tasks-v1';
const ARCHIVE_CACHE = 'thelist-cache-archive-v1';
const LEGACY_TASKS = 'clay-todo-tasks-v1';
const LEGACY_ARCHIVE = 'clay-todo-archive-v1';
const MIGRATION_FLAG = 'thelist-migrated-v1';

const state = {
  user: null,
  tasks: [],
  archive: [],
  pendingSection: null,
  draggedId: null,
};

// ─── Utils ──────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const decodeEntities = (s) => { const t = document.createElement('textarea'); t.innerHTML = s; return t.value; };
const nowIso = () => new Date().toISOString();

function toast(message, { error = false, duration = 3000 } = {}) {
  const stack = $('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (error ? ' error' : '');
  el.textContent = message;
  stack.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, duration);
}

function setSyncState(mode) {
  const el = $('syncIndicator');
  if (!el) return;
  el.classList.remove('active', 'offline');
  if (mode === 'active') el.classList.add('active');
  else if (mode === 'offline') el.classList.add('offline');
}

// ─── Theme ─────────────────────────────────────────────────
(function initTheme() {
  let theme;
  try { theme = localStorage.getItem(THEME_KEY); } catch(e) {}
  if (!theme) {
    theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', theme);
})();
$('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
});

$('date').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric'
});

// ─── Auth ───────────────────────────────────────────────────
async function init() {
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) onSignedIn(session);
    else if (event === 'SIGNED_OUT') onSignedOut();
  });

  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    await onSignedIn(session);
  } else {
    showSignIn();
  }
}

function showSignIn() {
  state.user = null;
  $('appRoot').classList.remove('ready');
  $('signinScreen').classList.add('open');
  $('accountRow').style.display = 'none';
  setTimeout(() => $('signinEmail').focus(), 50);
}

async function onSignedIn(session) {
  state.user = { id: session.user.id, email: session.user.email };
  $('signinScreen').classList.remove('open');
  $('accountEmail').textContent = state.user.email;
  $('accountRow').style.display = 'block';

  if (location.hash && location.hash.includes('access_token')) {
    history.replaceState(null, '', location.pathname + location.search);
  }

  state.tasks = loadCache(TASKS_CACHE);
  state.archive = loadCache(ARCHIVE_CACHE);
  render();
  $('appRoot').classList.add('ready');

  await maybeMigrateLegacy();
  await refreshFromDb();
}

async function onSignedOut() {
  state.user = null;
  state.tasks = [];
  state.archive = [];
  try {
    localStorage.removeItem(TASKS_CACHE);
    localStorage.removeItem(ARCHIVE_CACHE);
    localStorage.removeItem(MIGRATION_FLAG);
  } catch(e) {}
  render();
  showSignIn();
}

$('signinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('signinEmail').value.trim();
  const msg = $('signinMsg');
  const btn = $('signinSubmit');
  if (!email) return;
  btn.disabled = true;
  msg.className = 'signin-msg';
  msg.textContent = 'Sending…';
  try {
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: location.origin + location.pathname }
    });
    if (error) throw error;
    msg.textContent = 'Check your email for a sign-in link.';
  } catch (err) {
    msg.className = 'signin-msg error';
    msg.textContent = err.message || 'Something went wrong. Try again.';
  } finally {
    btn.disabled = false;
  }
});

$('signoutBtn').addEventListener('click', async () => {
  if (!confirm('Sign out of The List?')) return;
  await supabase.auth.signOut();
});

// ─── Cache helpers ──────────────────────────────────────────
function loadCache(key) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveCache(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

// ─── Migration (legacy localStorage → Supabase) ─────────────
//
// WHY THE DEDUP LOGIC: the original version only checked `if (MIGRATION_FLAG)`
// at the start and set it at the end. That created a race window where the
// same browser across two tabs, or desktop + mobile launching near-simultaneously
// on first sign-in, could each see "no rows yet, no flag yet" and both upload.
// That actually happened on 2026-04-24 — produced ~3× duplicate rows.
//
// THE FIX: we (1) set the flag immediately so same-browser concurrent tabs bail,
// and (2) before inserting, fetch what's already in the DB and filter the legacy
// payload to only rows whose (text, section) aren't already present. This makes
// the migration idempotent — safe to run multiple times, safe across devices.
async function maybeMigrateLegacy() {
  try { if (localStorage.getItem(MIGRATION_FLAG)) return; } catch(e) { return; }

  let legacyTasks = [], legacyArchive = [];
  try { legacyTasks = JSON.parse(localStorage.getItem(LEGACY_TASKS) || '[]'); } catch(e) {}
  try { legacyArchive = JSON.parse(localStorage.getItem(LEGACY_ARCHIVE) || '[]'); } catch(e) {}

  // Claim the migration slot immediately. Any concurrent tab in the same browser
  // that runs this function now will see the flag and return early.
  try { localStorage.setItem(MIGRATION_FLAG, nowIso()); } catch(e) {}

  if (!legacyTasks.length && !legacyArchive.length) return;

  setSyncState('active');
  try {
    // Fetch what's already there so we can dedupe against it (handles the
    // cross-device race: another device already uploaded some/all of this).
    const [existingTasksRes, existingArchiveRes] = await Promise.all([
      supabase.from('thelist_tasks').select('text, section'),
      supabase.from('thelist_archive').select('text, section, completed_at'),
    ]);
    if (existingTasksRes.error) throw existingTasksRes.error;
    if (existingArchiveRes.error) throw existingArchiveRes.error;

    const taskKey = (text, section) => `${text}\u0000${section || ''}`;
    const archiveKey = (text, section, completedAt) => `${text}\u0000${section || ''}\u0000${completedAt || ''}`;
    const existingTaskKeys = new Set((existingTasksRes.data || []).map(r => taskKey(r.text, r.section)));
    const existingArchiveKeys = new Set((existingArchiveRes.data || []).map(r => archiveKey(r.text, r.section, r.completed_at)));

    let uploadedTasks = 0, uploadedArchive = 0;

    if (legacyTasks.length) {
      const sectionPos = new Map();
      const rows = [];
      for (const t of legacyTasks) {
        const sec = t.section || 'Untitled';
        const pos = sectionPos.get(sec) || 0;
        sectionPos.set(sec, pos + 1);
        if (existingTaskKeys.has(taskKey(t.text || '', sec))) continue;
        rows.push({
          user_id: state.user.id,
          text: t.text || '',
          html: t.html || null,
          section: sec,
          position: pos,
          completed: !!t.completed,
          completed_at: t.completedAt || null
        });
      }
      if (rows.length) {
        const { error } = await supabase.from('thelist_tasks').insert(rows);
        if (error) throw error;
        uploadedTasks = rows.length;
      }
    }

    if (legacyArchive.length) {
      const rows = [];
      for (const e of legacyArchive) {
        const completedAt = e.completedAt || nowIso();
        if (existingArchiveKeys.has(archiveKey(e.text || '', e.section, completedAt))) continue;
        rows.push({
          user_id: state.user.id,
          text: e.text || '',
          section: e.section || null,
          completed_at: completedAt
        });
      }
      if (rows.length) {
        const { error } = await supabase.from('thelist_archive').insert(rows);
        if (error) throw error;
        uploadedArchive = rows.length;
      }
    }

    if (uploadedTasks || uploadedArchive) {
      toast(`Uploaded ${uploadedTasks} tasks · ${uploadedArchive} archive entries`);
    }
  } catch (err) {
    // Roll back the flag so a future load can retry.
    try { localStorage.removeItem(MIGRATION_FLAG); } catch(e) {}
    toast('Migration failed: ' + (err.message || err), { error: true, duration: 6000 });
  } finally {
    setSyncState('idle');
  }
}

// First-ever-user seed from <template id="seedTasks">
async function maybeSeedFirstRun() {
  const tpl = $('seedTasks');
  if (!tpl) return false;
  const { count } = await supabase.from('thelist_tasks').select('id', { count: 'exact', head: true });
  if ((count || 0) > 0) return false;

  const rows = [];
  tpl.content.querySelectorAll('section').forEach(sec => {
    const name = decodeEntities(sec.getAttribute('name') || 'Untitled');
    let pos = 0;
    sec.querySelectorAll('task').forEach(t => {
      const isHtml = t.hasAttribute('html');
      const raw = t.innerHTML.trim();
      rows.push({
        user_id: state.user.id,
        text: isHtml ? t.textContent.trim() : decodeEntities(raw),
        html: isHtml ? raw : null,
        section: name,
        position: pos++,
        completed: false
      });
    });
  });
  if (!rows.length) return false;
  const { error } = await supabase.from('thelist_tasks').insert(rows);
  if (error) { toast('Seed failed: ' + error.message, { error: true }); return false; }
  return true;
}

// ─── Data layer ─────────────────────────────────────────────
async function refreshFromDb() {
  if (!state.user) return;
  setSyncState('active');
  try {
    let [tasksRes, archiveRes] = await Promise.all([
      supabase.from('thelist_tasks').select('*').order('section').order('position'),
      supabase.from('thelist_archive').select('*').order('completed_at', { ascending: false })
    ]);
    if (tasksRes.error) throw tasksRes.error;
    if (archiveRes.error) throw archiveRes.error;

    // If DB is empty and migration hasn't run yet, seed from template
    if (!tasksRes.data.length && !localStorage.getItem(MIGRATION_FLAG)) {
      const seeded = await maybeSeedFirstRun();
      if (seeded) {
        const res = await supabase.from('thelist_tasks').select('*').order('section').order('position');
        if (!res.error) tasksRes = res;
        try { localStorage.setItem(MIGRATION_FLAG, nowIso()); } catch(e) {}
      }
    }

    state.tasks = tasksRes.data;
    state.archive = archiveRes.data;
    saveCache(TASKS_CACHE, state.tasks);
    saveCache(ARCHIVE_CACHE, state.archive);
    setSyncState('idle');
    render();
  } catch (err) {
    setSyncState(navigator.onLine ? 'idle' : 'offline');
    if (!state.tasks.length) {
      toast('Could not reach server. ' + (err.message || ''), { error: true });
    }
  }
}

async function dbAddTask({ text, html = null, section }) {
  const inSection = state.tasks.filter(t => t.section === section);
  const position = inSection.length ? Math.max(...inSection.map(t => t.position)) + 1 : 0;
  const row = { user_id: state.user.id, text, html, section, position, completed: false };
  const tempId = 'temp_' + genId();
  state.tasks.push({ ...row, id: tempId, created_at: nowIso(), updated_at: nowIso(), completed_at: null });
  render();
  try {
    const { data, error } = await supabase.from('thelist_tasks').insert(row).select().single();
    if (error) throw error;
    const idx = state.tasks.findIndex(t => t.id === tempId);
    if (idx !== -1) state.tasks[idx] = data;
    saveCache(TASKS_CACHE, state.tasks);
    render();
  } catch (err) {
    state.tasks = state.tasks.filter(t => t.id !== tempId);
    render();
    toast('Could not save task: ' + (err.message || err), { error: true });
  }
}

async function dbToggleTask(id, checked) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  const prev = { completed: t.completed, completed_at: t.completed_at };
  t.completed = checked;
  t.completed_at = checked ? nowIso() : null;
  const el = document.querySelector(`.task[data-id="${id}"]`);
  if (el) el.classList.toggle('done', checked);
  updateProgress();
  try {
    const { error } = await supabase
      .from('thelist_tasks')
      .update({ completed: t.completed, completed_at: t.completed_at, updated_at: nowIso() })
      .eq('id', id);
    if (error) throw error;
    if (checked) {
      const archiveRow = { user_id: state.user.id, text: t.text, section: t.section, completed_at: t.completed_at };
      const { data, error: aerr } = await supabase.from('thelist_archive').insert(archiveRow).select().single();
      if (!aerr && data) {
        state.archive.unshift(data);
        saveCache(ARCHIVE_CACHE, state.archive);
      }
    } else {
      const match = state.archive.find(e => e.text === t.text);
      if (match) {
        await supabase.from('thelist_archive').delete().eq('id', match.id);
        state.archive = state.archive.filter(e => e.id !== match.id);
        saveCache(ARCHIVE_CACHE, state.archive);
      }
    }
    saveCache(TASKS_CACHE, state.tasks);
  } catch (err) {
    t.completed = prev.completed;
    t.completed_at = prev.completed_at;
    if (el) el.classList.toggle('done', prev.completed);
    const cb = el && el.querySelector('input[type="checkbox"]');
    if (cb) cb.checked = prev.completed;
    updateProgress();
    toast('Could not update: ' + (err.message || err), { error: true });
  }
}

async function dbDeleteTask(id) {
  const idx = state.tasks.findIndex(t => t.id === id);
  if (idx === -1) return;
  const [removed] = state.tasks.splice(idx, 1);
  render();
  try {
    const { error } = await supabase.from('thelist_tasks').delete().eq('id', id);
    if (error) throw error;
    saveCache(TASKS_CACHE, state.tasks);
  } catch (err) {
    state.tasks.splice(idx, 0, removed);
    render();
    toast('Could not delete: ' + (err.message || err), { error: true });
  }
}

async function dbReorderTask(dragId, targetId, before) {
  const dragIdx = state.tasks.findIndex(t => t.id === dragId);
  const targetIdx = state.tasks.findIndex(t => t.id === targetId);
  if (dragIdx === -1 || targetIdx === -1) return;

  const [dragged] = state.tasks.splice(dragIdx, 1);
  const newTargetIdx = state.tasks.findIndex(t => t.id === targetId);
  const originalSection = dragged.section;
  dragged.section = state.tasks[newTargetIdx].section;
  state.tasks.splice(before ? newTargetIdx : newTargetIdx + 1, 0, dragged);

  // Recompute positions in both old and new sections
  const affectedSections = new Set([originalSection, dragged.section]);
  const updates = [];
  for (const sec of affectedSections) {
    let pos = 0;
    for (const t of state.tasks) {
      if (t.section === sec) {
        if (t.position !== pos) { t.position = pos; updates.push({ id: t.id, position: pos, section: sec }); }
        else if (t.id === dragged.id && originalSection !== dragged.section) {
          // section changed even if position didn't
          updates.push({ id: t.id, position: pos, section: sec });
        }
        pos++;
      }
    }
  }

  render();

  try {
    await Promise.all(updates.map(u => {
      const patch = { position: u.position, section: u.section, updated_at: nowIso() };
      return supabase.from('thelist_tasks').update(patch).eq('id', u.id);
    }));
    saveCache(TASKS_CACHE, state.tasks);
  } catch (err) {
    toast('Reorder save failed', { error: true });
    await refreshFromDb();
  }
}

async function dbClearCompleted() {
  const completed = state.tasks.filter(t => t.completed);
  if (!completed.length) { toast('Nothing to clear'); return; }
  const ids = completed.map(t => t.id);
  const backup = [...state.tasks];
  state.tasks = state.tasks.filter(t => !t.completed);
  render();
  try {
    const { error } = await supabase.from('thelist_tasks').delete().in('id', ids);
    if (error) throw error;
    saveCache(TASKS_CACHE, state.tasks);
    toast(`Cleared ${completed.length} completed`);
  } catch (err) {
    state.tasks = backup;
    render();
    toast('Clear failed: ' + (err.message || err), { error: true });
  }
}

async function dbResetAll() {
  if (!state.tasks.some(t => t.completed)) { toast('Nothing to reset'); return; }
  if (!confirm('Uncheck all tasks? (Archive history is kept.)')) return;
  const ids = state.tasks.filter(t => t.completed).map(t => t.id);
  state.tasks.forEach(t => { if (ids.includes(t.id)) { t.completed = false; t.completed_at = null; } });
  render();
  try {
    const { error } = await supabase
      .from('thelist_tasks')
      .update({ completed: false, completed_at: null, updated_at: nowIso() })
      .in('id', ids);
    if (error) throw error;
    saveCache(TASKS_CACHE, state.tasks);
  } catch (err) {
    await refreshFromDb();
    toast('Reset failed', { error: true });
  }
}

// ─── Render ─────────────────────────────────────────────────
function getSections() {
  const seen = new Set();
  const out = [];
  for (const t of state.tasks) {
    if (!seen.has(t.section)) { seen.add(t.section); out.push(t.section); }
  }
  return out;
}

function render() {
  const tasks = [...state.tasks];
  const sectionOrder = [];
  const seen = new Set();
  for (const t of tasks) {
    if (!seen.has(t.section)) { seen.add(t.section); sectionOrder.push(t.section); }
  }
  const grouped = new Map(sectionOrder.map(s => [s, []]));
  for (const t of tasks) grouped.get(t.section).push(t);
  for (const s of sectionOrder) grouped.get(s).sort((a, b) => a.position - b.position);

  const container = $('sectionsContainer');
  container.innerHTML = '';
  for (const name of sectionOrder) {
    const section = document.createElement('div');
    section.className = 'section';
    section.dataset.section = name;
    section.innerHTML = `<div class="section-header">${escapeHtml(name)}</div>`;
    for (const t of grouped.get(name)) {
      const label = document.createElement('label');
      label.className = 'task' + (t.completed ? ' done' : '');
      label.draggable = true;
      label.dataset.id = t.id;
      const inner = t.html ? t.html : escapeHtml(t.text);
      label.innerHTML =
        `<span class="drag-handle" aria-hidden="true">⋮⋮</span>` +
        `<span class="checkbox"><input type="checkbox" ${t.completed ? 'checked' : ''}><span class="checkbox-visual"></span></span>` +
        `<span class="task-text">${inner}</span>` +
        `<button class="task-delete" type="button" title="Delete" aria-label="Delete task">&times;</button>`;
      section.appendChild(label);
    }
    container.appendChild(section);
  }
  wireTasks();
  renderSectionChips();
  updateProgress();
}

function wireTasks() {
  document.querySelectorAll('.task').forEach(el => {
    const id = el.dataset.id;
    const cb = el.querySelector('input[type="checkbox"]');
    cb.addEventListener('change', (e) => { e.stopPropagation(); dbToggleTask(id, cb.checked); });
    const del = el.querySelector('.task-delete');
    del.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); dbDeleteTask(id); });
    el.querySelectorAll('.task-text a').forEach(a => a.addEventListener('click', (ev) => ev.stopPropagation()));
    el.addEventListener('dragstart', handleDragStart);
    el.addEventListener('dragover', handleDragOver);
    el.addEventListener('dragleave', handleDragLeave);
    el.addEventListener('drop', handleDrop);
    el.addEventListener('dragend', handleDragEnd);
  });
}

function handleDragStart(e) {
  state.draggedId = this.dataset.id;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', state.draggedId); } catch(err) {}
}
function handleDragOver(e) {
  if (!state.draggedId || state.draggedId === this.dataset.id) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const rect = this.getBoundingClientRect();
  const above = e.clientY < rect.top + rect.height / 2;
  this.classList.toggle('drop-above', above);
  this.classList.toggle('drop-below', !above);
}
function handleDragLeave() {
  this.classList.remove('drop-above', 'drop-below');
}
function handleDrop(e) {
  e.preventDefault();
  const dragId = state.draggedId;
  if (!dragId || dragId === this.dataset.id) { handleDragEnd.call(this); return; }
  const targetId = this.dataset.id;
  const rect = this.getBoundingClientRect();
  const before = e.clientY < rect.top + rect.height / 2;
  this.classList.remove('drop-above', 'drop-below');
  dbReorderTask(dragId, targetId, before);
}
function handleDragEnd() {
  document.querySelectorAll('.dragging, .drop-above, .drop-below')
    .forEach(el => el.classList.remove('dragging', 'drop-above', 'drop-below'));
  state.draggedId = null;
}

// ─── Add-task form ──────────────────────────────────────────
function renderSectionChips() {
  const sections = getSections();
  if (!state.pendingSection || (state.pendingSection !== '__new__' && !sections.includes(state.pendingSection))) {
    state.pendingSection = sections[0] || '__new__';
  }
  const host = $('addTaskSections');
  host.innerHTML = '';
  sections.forEach(name => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'section-chip' + (state.pendingSection === name ? ' active' : '');
    b.textContent = name;
    b.onclick = () => {
      state.pendingSection = name;
      $('addTaskNewSection').style.display = 'none';
      renderSectionChips();
      updateSubmitState();
    };
    host.appendChild(b);
  });
  const nb = document.createElement('button');
  nb.type = 'button';
  nb.className = 'section-chip new' + (state.pendingSection === '__new__' ? ' active' : '');
  nb.textContent = '+ New';
  nb.onclick = () => {
    state.pendingSection = '__new__';
    const ns = $('addTaskNewSection');
    ns.style.display = 'block';
    renderSectionChips();
    setTimeout(() => ns.focus(), 0);
    updateSubmitState();
  };
  host.appendChild(nb);
}
function updateSubmitState() {
  const taskVal = $('addTaskInput').value.trim();
  const newSecVal = $('addTaskNewSection').value.trim();
  const ok = taskVal && (state.pendingSection !== '__new__' || newSecVal);
  $('addTaskSubmit').disabled = !ok;
}
async function submitNewTask() {
  const input = $('addTaskInput');
  const newSecInput = $('addTaskNewSection');
  const text = input.value.trim();
  if (!text) return;
  const section = state.pendingSection === '__new__' ? newSecInput.value.trim() : state.pendingSection;
  if (!section) return;
  await dbAddTask({ text, section });
  input.value = '';
  newSecInput.value = '';
  newSecInput.style.display = 'none';
  state.pendingSection = section;
  renderSectionChips();
  updateSubmitState();
  input.focus();
}
$('addTaskInput').addEventListener('input', updateSubmitState);
$('addTaskNewSection').addEventListener('input', updateSubmitState);
$('addTaskInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitNewTask(); } });
$('addTaskNewSection').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitNewTask(); } });
$('addTaskSubmit').addEventListener('click', submitNewTask);
$('clearCompletedBtn').addEventListener('click', dbClearCompleted);

// ─── Progress ──────────────────────────────────────────────
function updateProgress() {
  const total = state.tasks.length;
  const done = state.tasks.filter(t => t.completed).length;
  const pct = total ? (done / total) * 100 : 0;
  $('progress').style.width = pct + '%';
  $('stats').textContent = `${done} / ${total}`;
  $('pct').textContent = `${Math.round(pct)}%`;
}

// ─── Archive modal ──────────────────────────────────────────
function formatDayLabel(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return 'Today';
  if (sameDay(d, yesterday)) return 'Yesterday';
  return d.toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric',
    year: d.getFullYear() === today.getFullYear() ? undefined : 'numeric'
  });
}
function dayKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function renderArchive() {
  const body = $('archiveBody');
  const summary = $('archiveSummary');
  const count = $('archiveCount');
  const filter = $('archiveSearch').value.trim().toLowerCase();
  const filtered = state.archive
    .filter(e => !filter || e.text.toLowerCase().includes(filter) || (e.section || '').toLowerCase().includes(filter))
    .sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''));
  const now = Date.now();
  const WEEK = 7 * 24 * 60 * 60 * 1000;
  const thisWeek = state.archive.filter(e => now - new Date(e.completed_at).getTime() < WEEK).length;
  const thisMonth = state.archive.filter(e => {
    const d = new Date(e.completed_at), t = new Date();
    return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth();
  }).length;
  summary.textContent = `${thisWeek} this week · ${thisMonth} this month · ${state.archive.length} all-time`;
  count.textContent = `${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}${filter ? ' matching' : ''}`;
  if (!filtered.length) {
    body.innerHTML = `<div class="archive-empty">${filter ? 'No matches.' : 'Nothing here yet. Check a task to start your history.'}</div>`;
    return;
  }
  const groups = new Map();
  for (const e of filtered) {
    const k = dayKey(e.completed_at);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(e);
  }
  let html = '';
  for (const [, list] of groups) {
    html += `<div class="archive-day"><div class="archive-day-label">${escapeHtml(formatDayLabel(list[0].completed_at))}</div>`;
    for (const e of list) {
      html += `<div class="archive-entry"><div class="archive-entry-text">${escapeHtml(e.text)}</div>${e.section ? `<div class="archive-entry-section">${escapeHtml(e.section)}</div>` : ''}</div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}
function openArchive() {
  renderArchive();
  $('archiveOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => $('archiveSearch').focus(), 50);
}
function closeArchive() {
  $('archiveOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
$('archiveSearch').addEventListener('input', renderArchive);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeArchive(); });

function exportArchive() {
  const blob = new Blob([JSON.stringify(state.archive, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `the-list-archive-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
async function clearArchive() {
  if (!confirm('Delete all archive entries? This cannot be undone.')) return;
  const ids = state.archive.map(e => e.id);
  if (!ids.length) return;
  try {
    const { error } = await supabase.from('thelist_archive').delete().in('id', ids);
    if (error) throw error;
    state.archive = [];
    saveCache(ARCHIVE_CACHE, []);
    renderArchive();
    toast('Archive cleared');
  } catch (err) {
    toast('Clear failed: ' + (err.message || err), { error: true });
  }
}

// ─── Cross-device sync (refetch on focus) ───────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.user) refreshFromDb();
});
window.addEventListener('online', () => {
  setSyncState('idle');
  if (state.user) refreshFromDb();
});
window.addEventListener('offline', () => setSyncState('offline'));
if (!navigator.onLine) setSyncState('offline');

// ─── Error boundary ────────────────────────────────────────
window.addEventListener('error', (e) => {
  console.error('Uncaught error:', e.error || e.message);
  toast('Something went wrong. Check the console.', { error: true });
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('Unhandled rejection:', e.reason);
  toast('A background task failed. Check the console.', { error: true });
});

// Inline HTML handlers (archive modal close button, etc.)
window.openArchive = openArchive;
window.closeArchive = closeArchive;
window.exportArchive = exportArchive;
window.clearArchive = clearArchive;
window.resetAll = dbResetAll;

// Service worker
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}

// Go
init();
</script>
</body>
</html>
