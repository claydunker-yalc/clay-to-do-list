<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The List</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --faint: #a3a3a3;
    --hairline: #e7e5e4;
    --subtle: #f5f4f2;
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #141414;
    --ink: #fafafa;
    --muted: #a3a3a3;
    --faint: #6b6b6b;
    --hairline: #262626;
    --subtle: #1c1c1c;
  }
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .container {
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 200;
    font-size: 16px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--ink);
    padding: 4rem 1.25rem 6rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container {
    position: relative;
    max-width: 580px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 24px;
    padding: 3.5rem 3rem;
  }
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .theme-toggle:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .theme-toggle svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  @media (max-width: 520px) {
    body { padding: 2rem 0.75rem 4rem; }
    .container { padding: 2.25rem 1.5rem; border-radius: 20px; }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  h1 {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 2.75rem;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }
  .subtitle {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .progress {
    margin: 0 0 2.75rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.65rem;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .section {
    margin-bottom: 2.25rem;
  }
  .section:last-of-type {
    margin-bottom: 0;
  }
  .section-header {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: -0.005em;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    padding: 0.7rem 0.5rem;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.18s ease;
  }
  .task:hover {
    background: var(--subtle);
  }

  .checkbox {
    position: relative;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 0.15rem;
  }
  .task input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .checkbox-visual {
    position: absolute;
    inset: 0;
    border: 1px solid var(--faint);
    border-radius: 50%;
    background: var(--surface);
    transition: all 0.2s ease;
  }
  .checkbox-visual::after {
    content: "";
    position: absolute;
    top: 4px;
    left: 3px;
    width: 10px;
    height: 5px;
    border-left: 1.5px solid var(--surface);
    border-bottom: 1.5px solid var(--surface);
    transform: rotate(-45deg) scale(0);
    transition: transform 0.2s ease;
  }
  .task:hover .checkbox-visual {
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual {
    background: var(--ink);
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual::after {
    transform: rotate(-45deg) scale(1);
  }

  .task-text {
    flex: 1;
    font-weight: 300;
    font-size: 0.975rem;
    color: var(--ink);
    line-height: 1.45;
    transition: color 0.2s ease;
  }
  .task.done .task-text {
    color: var(--faint);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    text-decoration-color: var(--faint);
  }

  .note {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--muted);
    margin-left: 0.35rem;
    font-weight: 300;
  }

  .task-text a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: var(--muted);
    font-weight: 400;
    transition: text-decoration-color 0.15s ease;
  }
  .task-text a:hover {
    text-decoration-color: var(--ink);
  }
  .task.done .task-text a {
    color: var(--faint);
    text-decoration-color: var(--faint);
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  .reset-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .reset-btn:hover {
    color: var(--ink);
  }

  /* ─── Archive modal ─── */
  .archive-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .archive-overlay.open {
    display: flex;
    opacity: 1;
  }
  .archive-modal {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .archive-head {
    padding: 2rem 2.25rem 1.25rem;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .archive-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.75rem;
    color: var(--ink);
    line-height: 1;
  }
  .archive-summary {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
    margin-top: 0.5rem;
  }
  .archive-close {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: var(--faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
  }
  .archive-close:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .archive-search {
    margin: 0 2.25rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--hairline);
  }
  .archive-search input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.25rem 0;
  }
  .archive-search input::placeholder {
    color: var(--faint);
  }
  .archive-body {
    overflow-y: auto;
    padding: 0.5rem 2.25rem 1.5rem;
    flex: 1;
  }
  .archive-day {
    margin-top: 1.5rem;
  }
  .archive-day:first-child {
    margin-top: 1rem;
  }
  .archive-day-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .archive-entry {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--hairline);
    color: var(--muted);
    font-weight: 300;
    font-size: 0.92rem;
  }
  .archive-entry:last-child {
    border-bottom: none;
  }
  .archive-entry-text {
    flex: 1;
    line-height: 1.4;
  }
  .archive-entry-section {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faint);
    flex-shrink: 0;
    align-self: center;
  }
  .archive-empty {
    padding: 3rem 0;
    text-align: center;
    color: var(--faint);
    font-weight: 300;
    font-size: 0.9rem;
  }
  .archive-foot {
    padding: 1rem 2.25rem 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .archive-foot-count {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
  }
  .archive-actions {
    display: flex;
    gap: 1.25rem;
  }
  .archive-action {
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0;
    transition: color 0.2s ease;
  }
  .archive-action:hover {
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="container">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </svg>
  </button>
  <div class="header">
    <h1>The List</h1>
    <div class="subtitle" id="date"></div>
  </div>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="progress-meta">
      <span id="stats">0 / 13</span>
      <span id="pct">0%</span>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Do Today</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Ruben Hassid Claude Design tutorial</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">$2k to Kristi Crook ($1k from her biggest and one from Mer&rsquo;s)</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Instructions for Gma and Gpa B</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">$300 to Andrea Dunlap</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Salary bands for NEA dues</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Hamburger doesn&rsquo;t work on Nikki&rsquo;s site</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Pay IRS</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Get $200 cash</span></label>
  </div>

  <div class="section">
    <div class="section-header">Next Week &amp; Follow-ups</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Job description handoff interview</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Clay-Mate MCP searchable dashboard</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Review <a href="https://docs.google.com/forms/d/1dhce8ibBCnBtYm0WOzgEElm5Q6oozsLadivq3UEBdc4/edit" target="_blank" rel="noopener" onclick="event.stopPropagation()">AI Survey first draft</a>, share with Adam</span></label>
  </div>

  <div class="section">
    <div class="section-header">Low Priority</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Socratic method prompt</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Claude Design study &mdash; sites I like</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">AI Cred assessment retake</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">MagicWalk app</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Flummoxing Flags app</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Compare Chalkie vs. Diffit vs. Brisk</span></label>
  </div>

  <div class="section">
    <div class="section-header">Sometime Later</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Change battery on mom&rsquo;s mower</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Organize and deliver tents to Bement</span></label>
  </div>

  <div class="footer">
    <button class="reset-btn" onclick="openArchive()">History</button>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>
</div>

<div class="archive-overlay" id="archiveOverlay" onclick="if(event.target===this) closeArchive()">
  <div class="archive-modal" role="dialog" aria-modal="true" aria-labelledby="archiveTitle">
    <div class="archive-head">
      <div>
        <div class="archive-title" id="archiveTitle">History</div>
        <div class="archive-summary" id="archiveSummary">&nbsp;</div>
      </div>
      <button class="archive-close" onclick="closeArchive()" aria-label="Close">&times;</button>
    </div>
    <div class="archive-search">
      <input type="text" id="archiveSearch" placeholder="Search completed tasks…" />
    </div>
    <div class="archive-body" id="archiveBody"></div>
    <div class="archive-foot">
      <div class="archive-foot-count" id="archiveCount">0 entries</div>
      <div class="archive-actions">
        <button class="archive-action" onclick="exportArchive()">Export JSON</button>
        <button class="archive-action" onclick="clearArchive()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'clay-todo-v8';
  const THEME_KEY = 'clay-todo-theme';
  const ARCHIVE_KEY = 'clay-todo-archive-v1';

  (function initTheme() {
    let theme;
    try { theme = localStorage.getItem(THEME_KEY); } catch(e) {}
    if (!theme) {
      theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
  });

  document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  const checkboxes = document.querySelectorAll('.task input[type="checkbox"]');

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    checkboxes.forEach((cb, i) => {
      if (saved[i] !== undefined) {
        cb.checked = saved[i];
        cb.closest('.task').classList.toggle('done', cb.checked);
      }
    });
  } catch(e) {}

  function saveState() {
    const state = Array.from(checkboxes).map(cb => cb.checked);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function updateProgress() {
    const total = checkboxes.length;
    const done = Array.from(checkboxes).filter(cb => cb.checked).length;
    const pct = total ? (done / total) * 100 : 0;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('stats').textContent = `${done} / ${total}`;
    document.getElementById('pct').textContent = `${Math.round(pct)}%`;
  }

  checkboxes.forEach(cb => {
    cb.addEventListener('change', () => {
      const task = cb.closest('.task');
      task.classList.toggle('done', cb.checked);
      if (cb.checked) {
        archiveAdd(task);
      } else {
        archiveRemoveLatestMatch(task);
      }
      saveState();
      updateProgress();
    });
  });

  function resetAll() {
    if (!confirm('Reset all tasks?')) return;
    checkboxes.forEach(cb => {
      cb.checked = false;
      cb.closest('.task').classList.remove('done');
    });
    saveState();
    updateProgress();
  }

  // ─── Archive ─────────────────────────────────────────────────
  // Shape: [{ id, text, section, completedAt (ISO) }, ...]
  // Keep this flat + ISO dates so migrating to Supabase later is a
  // straight `INSERT` per row. No nested structures, no lossy formats.
  function loadArchive() {
    try {
      const raw = localStorage.getItem(ARCHIVE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveArchive(entries) {
    try { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(entries)); } catch(e) {}
  }
  function taskText(taskEl) {
    return taskEl.querySelector('.task-text').textContent.trim();
  }
  function taskSection(taskEl) {
    const section = taskEl.closest('.section');
    const header = section ? section.querySelector('.section-header') : null;
    return header ? header.textContent.trim() : '';
  }
  function archiveAdd(taskEl) {
    const entries = loadArchive();
    entries.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
      text: taskText(taskEl),
      section: taskSection(taskEl),
      completedAt: new Date().toISOString()
    });
    saveArchive(entries);
  }
  function archiveRemoveLatestMatch(taskEl) {
    // If user unchecks immediately (misclick), peel the most recent matching entry.
    const text = taskText(taskEl);
    const entries = loadArchive();
    for (let i = entries.length - 1; i >= 0; i--) {
      if (entries[i].text === text) {
        entries.splice(i, 1);
        saveArchive(entries);
        return;
      }
    }
  }

  function formatDayLabel(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    const sameDay = (a, b) => a.toDateString() === b.toDateString();
    if (sameDay(d, today)) return 'Today';
    if (sameDay(d, yesterday)) return 'Yesterday';
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: d.getFullYear() === today.getFullYear() ? undefined : 'numeric' });
  }
  function dayKey(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderArchive() {
    const body = document.getElementById('archiveBody');
    const summary = document.getElementById('archiveSummary');
    const count = document.getElementById('archiveCount');
    const filter = document.getElementById('archiveSearch').value.trim().toLowerCase();

    const entries = loadArchive()
      .filter(e => !filter || e.text.toLowerCase().includes(filter) || (e.section || '').toLowerCase().includes(filter))
      .sort((a, b) => b.completedAt.localeCompare(a.completedAt));

    // Summary counts (always over the full archive, not filtered)
    const all = loadArchive();
    const now = Date.now();
    const WEEK = 7 * 24 * 60 * 60 * 1000;
    const thisWeek = all.filter(e => now - new Date(e.completedAt).getTime() < WEEK).length;
    const thisMonth = all.filter(e => {
      const d = new Date(e.completedAt);
      const t = new Date();
      return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth();
    }).length;
    summary.textContent = `${thisWeek} this week · ${thisMonth} this month · ${all.length} all-time`;
    count.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}${filter ? ' matching' : ''}`;

    if (!entries.length) {
      body.innerHTML = `<div class="archive-empty">${filter ? 'No matches.' : 'Nothing here yet. Check a task to start your history.'}</div>`;
      return;
    }

    // Group by day
    const groups = new Map();
    for (const e of entries) {
      const k = dayKey(e.completedAt);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(e);
    }

    const escape = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let html = '';
    for (const [, list] of groups) {
      html += `<div class="archive-day"><div class="archive-day-label">${escape(formatDayLabel(list[0].completedAt))}</div>`;
      for (const e of list) {
        html += `<div class="archive-entry"><div class="archive-entry-text">${escape(e.text)}</div>${e.section ? `<div class="archive-entry-section">${escape(e.section)}</div>` : ''}</div>`;
      }
      html += '</div>';
    }
    body.innerHTML = html;
  }

  function openArchive() {
    renderArchive();
    document.getElementById('archiveOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('archiveSearch').focus(), 50);
  }
  function closeArchive() {
    document.getElementById('archiveOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('archiveSearch').addEventListener('input', renderArchive);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeArchive();
  });

  function exportArchive() {
    const entries = loadArchive();
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `the-list-archive-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  function clearArchive() {
    if (!confirm('Delete all archive entries? This cannot be undone. (Tip: export first.)')) return;
    saveArchive([]);
    renderArchive();
  }

  // Expose for inline handlers
  window.openArchive = openArchive;
  window.closeArchive = closeArchive;
  window.exportArchive = exportArchive;
  window.clearArchive = clearArchive;

  updateProgress();
</script>
</body>
</html>
