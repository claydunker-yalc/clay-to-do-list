<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The List</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --faint: #a3a3a3;
    --hairline: #e7e5e4;
    --subtle: #f5f4f2;
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #141414;
    --ink: #fafafa;
    --muted: #a3a3a3;
    --faint: #6b6b6b;
    --hairline: #262626;
    --subtle: #1c1c1c;
  }
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .container {
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 200;
    font-size: 16px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--ink);
    padding: 4rem 1.25rem 6rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container {
    position: relative;
    max-width: 580px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 24px;
    padding: 3.5rem 3rem;
  }
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .theme-toggle:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .theme-toggle svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  @media (max-width: 520px) {
    body { padding: 2rem 0.75rem 4rem; }
    .container { padding: 2.25rem 1.5rem; border-radius: 20px; }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  h1 {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 2.75rem;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }
  .subtitle {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .progress {
    margin: 0 0 2.75rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.65rem;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .section {
    margin-bottom: 2.25rem;
  }
  .section:last-of-type {
    margin-bottom: 0;
  }
  .section-header {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: -0.005em;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    padding: 0.7rem 0.5rem;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.18s ease;
  }
  .task:hover {
    background: var(--subtle);
  }

  .checkbox {
    position: relative;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 0.15rem;
  }
  .task input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .checkbox-visual {
    position: absolute;
    inset: 0;
    border: 1px solid var(--faint);
    border-radius: 50%;
    background: var(--surface);
    transition: all 0.2s ease;
  }
  .checkbox-visual::after {
    content: "";
    position: absolute;
    top: 4px;
    left: 3px;
    width: 10px;
    height: 5px;
    border-left: 1.5px solid var(--surface);
    border-bottom: 1.5px solid var(--surface);
    transform: rotate(-45deg) scale(0);
    transition: transform 0.2s ease;
  }
  .task:hover .checkbox-visual {
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual {
    background: var(--ink);
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual::after {
    transform: rotate(-45deg) scale(1);
  }

  .task-text {
    flex: 1;
    font-weight: 300;
    font-size: 0.975rem;
    color: var(--ink);
    line-height: 1.45;
    transition: color 0.2s ease;
  }
  .task.done .task-text {
    color: var(--faint);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    text-decoration-color: var(--faint);
  }

  .note {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--muted);
    margin-left: 0.35rem;
    font-weight: 300;
  }

  .task-text a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: var(--muted);
    font-weight: 400;
    transition: text-decoration-color 0.15s ease;
  }
  .task-text a:hover {
    text-decoration-color: var(--ink);
  }
  .task.done .task-text a {
    color: var(--faint);
    text-decoration-color: var(--faint);
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: center;
    gap: 2rem;
  }
  .reset-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .reset-btn:hover {
    color: var(--ink);
  }

  /* ─── Drag handle ─── */
  .drag-handle {
    color: var(--faint);
    cursor: grab;
    padding: 0 0.5rem 0 0;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease;
    font-size: 0.85rem;
    line-height: 1;
    letter-spacing: -0.1em;
    user-select: none;
    flex-shrink: 0;
    align-self: center;
  }
  .task:hover .drag-handle {
    opacity: 1;
  }
  .drag-handle:active {
    cursor: grabbing;
  }
  .task.dragging {
    opacity: 0.4;
  }
  .task.drop-above {
    box-shadow: inset 0 2px 0 0 var(--ink);
  }
  .task.drop-below {
    box-shadow: inset 0 -2px 0 0 var(--ink);
  }

  /* ─── Task delete (hover) ─── */
  .task-delete {
    opacity: 0;
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 0.25rem;
    transition: opacity 0.15s ease, color 0.15s ease;
    flex-shrink: 0;
  }
  .task:hover .task-delete {
    opacity: 1;
  }
  .task-delete:hover {
    color: var(--ink);
  }

  /* ─── Add task form ─── */
  .add-task {
    margin-top: 3rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--hairline);
  }
  .add-task-input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 300;
    padding: 0.35rem 0;
    border-bottom: 1px solid var(--hairline);
    transition: border-color 0.2s ease;
  }
  .add-task-input:focus {
    border-bottom-color: var(--ink);
  }
  .add-task-input::placeholder {
    color: var(--faint);
    font-style: italic;
  }
  .add-task-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .add-task-sections {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .section-chip {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 0.3rem 0.75rem;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .section-chip:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .section-chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--surface);
  }
  .section-chip.new {
    border-style: dashed;
  }
  .add-task-submit {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    padding: 0.35rem 1.1rem;
    color: var(--faint);
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .add-task-submit:not(:disabled):hover {
    color: var(--ink);
    border-color: var(--ink);
  }
  .add-task-submit:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }
  .add-task-new-section {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.35rem 0;
    margin-top: 0.75rem;
    border-bottom: 1px solid var(--hairline);
  }
  .add-task-new-section:focus {
    border-bottom-color: var(--ink);
  }
  .add-task-new-section::placeholder {
    color: var(--faint);
    font-style: italic;
  }

  /* ─── Archive modal ─── */
  .archive-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .archive-overlay.open {
    display: flex;
    opacity: 1;
  }
  .archive-modal {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .archive-head {
    padding: 2rem 2.25rem 1.25rem;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .archive-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.75rem;
    color: var(--ink);
    line-height: 1;
  }
  .archive-summary {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
    margin-top: 0.5rem;
  }
  .archive-close {
    background: transparent;
    border: 1px solid var(--hairline);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: var(--faint);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    flex-shrink: 0;
    transition: color 0.2s, border-color 0.2s;
  }
  .archive-close:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .archive-search {
    margin: 0 2.25rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--hairline);
  }
  .archive-search input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 300;
    padding: 0.25rem 0;
  }
  .archive-search input::placeholder {
    color: var(--faint);
  }
  .archive-body {
    overflow-y: auto;
    padding: 0.5rem 2.25rem 1.5rem;
    flex: 1;
  }
  .archive-day {
    margin-top: 1.5rem;
  }
  .archive-day:first-child {
    margin-top: 1rem;
  }
  .archive-day-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 400;
    margin-bottom: 0.5rem;
  }
  .archive-entry {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--hairline);
    color: var(--muted);
    font-weight: 300;
    font-size: 0.92rem;
  }
  .archive-entry:last-child {
    border-bottom: none;
  }
  .archive-entry-text {
    flex: 1;
    line-height: 1.4;
  }
  .archive-entry-section {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--faint);
    flex-shrink: 0;
    align-self: center;
  }
  .archive-empty {
    padding: 3rem 0;
    text-align: center;
    color: var(--faint);
    font-weight: 300;
    font-size: 0.9rem;
  }
  .archive-foot {
    padding: 1rem 2.25rem 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
  }
  .archive-foot-count {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 300;
  }
  .archive-actions {
    display: flex;
    gap: 1.25rem;
  }
  .archive-action {
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0;
    transition: color 0.2s ease;
  }
  .archive-action:hover {
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="container">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </svg>
  </button>
  <div class="header">
    <h1>The List</h1>
    <div class="subtitle" id="date"></div>
  </div>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="progress-meta">
      <span id="stats">0 / 13</span>
      <span id="pct">0%</span>
    </div>
  </div>

  <div id="sectionsContainer"></div>

  <!-- Seed data: consumed once by JS to populate localStorage, then ignored.
       Edit here to change the first-run defaults (e.g., for a fresh browser). -->
  <template id="seedTasks">
    <section name="Do Today">
      <task>Ruben Hassid Claude Design tutorial</task>
      <task>$2k to Kristi Crook ($1k from her biggest and one from Mer&rsquo;s)</task>
      <task>Instructions for Gma and Gpa B</task>
      <task>$300 to Andrea Dunlap</task>
      <task>Salary bands for NEA dues</task>
      <task>Hamburger doesn&rsquo;t work on Nikki&rsquo;s site</task>
      <task>Pay IRS</task>
      <task>Get $200 cash</task>
    </section>
    <section name="Next Week &amp; Follow-ups">
      <task>Job description handoff interview</task>
      <task>Clay-Mate MCP searchable dashboard</task>
      <task html>Review <a href="https://docs.google.com/forms/d/1dhce8ibBCnBtYm0WOzgEElm5Q6oozsLadivq3UEBdc4/edit" target="_blank" rel="noopener">AI Survey first draft</a>, share with Adam</task>
    </section>
    <section name="Low Priority">
      <task>Socratic method prompt</task>
      <task>Claude Design study &mdash; sites I like</task>
      <task>AI Cred assessment retake</task>
      <task>MagicWalk app</task>
      <task>Flummoxing Flags app</task>
      <task>Compare Chalkie vs. Diffit vs. Brisk</task>
    </section>
    <section name="Sometime Later">
      <task>Change battery on mom&rsquo;s mower</task>
      <task>Organize and deliver tents to Bement</task>
    </section>
  </template>

  <div class="add-task">
    <input type="text" class="add-task-input" id="addTaskInput" placeholder="Add a task&hellip;" />
    <input type="text" class="add-task-new-section" id="addTaskNewSection" placeholder="New section name&hellip;" style="display:none" />
    <div class="add-task-controls">
      <div class="add-task-sections" id="addTaskSections"></div>
      <button class="add-task-submit" id="addTaskSubmit" disabled>Add</button>
    </div>
  </div>

  <div class="footer">
    <button class="reset-btn" onclick="openArchive()">History</button>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>
</div>

<div class="archive-overlay" id="archiveOverlay" onclick="if(event.target===this) closeArchive()">
  <div class="archive-modal" role="dialog" aria-modal="true" aria-labelledby="archiveTitle">
    <div class="archive-head">
      <div>
        <div class="archive-title" id="archiveTitle">History</div>
        <div class="archive-summary" id="archiveSummary">&nbsp;</div>
      </div>
      <button class="archive-close" onclick="closeArchive()" aria-label="Close">&times;</button>
    </div>
    <div class="archive-search">
      <input type="text" id="archiveSearch" placeholder="Search completed tasks…" />
    </div>
    <div class="archive-body" id="archiveBody"></div>
    <div class="archive-foot">
      <div class="archive-foot-count" id="archiveCount">0 entries</div>
      <div class="archive-actions">
        <button class="archive-action" onclick="exportArchive()">Export JSON</button>
        <button class="archive-action" onclick="clearArchive()">Clear</button>
      </div>
    </div>
  </div>
</div>

<script>
  /* ─────────────────────────────────────────────────────────────
     The List — data model
     ─────────────────────────────────────────────────────────────
     WHY: Everything is data, not markup. Tasks are stored as a
     single ordered array in localStorage, rendered dynamically.
     This is what makes add / delete / drag-reorder / cross-section
     drag all work without fighting the DOM.

     KEY: clay-todo-tasks-v1
     SHAPE: [{ id, text, section, completed, completedAt?, html? }]
       - text: plain-text form (used for archive + display fallback)
       - html: optional rich HTML (preserves links from seed template)
       - order: implicit — the array order IS the display order,
         grouped by section-of-first-occurrence.

     FIRST RUN: we read the <template id="seedTasks"> block and
     materialize it into localStorage. After that, the template is
     ignored and the store is the source of truth.

     MIGRATION: this shape is intentionally flat with ISO dates so
     Supabase migration is a straight INSERT per row. No nested data.
     ───────────────────────────────────────────────────────────── */

  const TASKS_KEY = 'clay-todo-tasks-v1';
  const THEME_KEY = 'clay-todo-theme';
  const ARCHIVE_KEY = 'clay-todo-archive-v1';

  // ─── Theme ─────────────────────────────────────────────────
  (function initTheme() {
    let theme;
    try { theme = localStorage.getItem(THEME_KEY); } catch(e) {}
    if (!theme) {
      theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
  });

  document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  // ─── Utils ─────────────────────────────────────────────────
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

  // ─── Task store ─────────────────────────────────────────────
  function seedFromTemplate() {
    const tpl = document.getElementById('seedTasks');
    if (!tpl) return [];
    const tasks = [];
    tpl.content.querySelectorAll('section').forEach(sec => {
      const name = sec.getAttribute('name') || 'Untitled';
      sec.querySelectorAll('task').forEach(t => {
        const isHtml = t.hasAttribute('html');
        const raw = t.innerHTML.trim();
        tasks.push({
          id: genId(),
          text: isHtml ? t.textContent.trim() : decodeEntities(raw),
          html: isHtml ? raw : null,
          section: decodeEntities(name),
          completed: false
        });
      });
    });
    return tasks;
  }
  function decodeEntities(s) {
    const txt = document.createElement('textarea');
    txt.innerHTML = s;
    return txt.value;
  }
  function loadTasks() {
    try {
      const raw = localStorage.getItem(TASKS_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    const seeded = seedFromTemplate();
    saveTasks(seeded);
    return seeded;
  }
  function saveTasks(tasks) {
    try { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); } catch(e) {}
  }

  // ─── Render ────────────────────────────────────────────────
  function render() {
    const tasks = loadTasks();
    const container = document.getElementById('sectionsContainer');

    // Group by section, preserving order of first occurrence
    const order = [];
    const map = new Map();
    for (const t of tasks) {
      if (!map.has(t.section)) { map.set(t.section, []); order.push(t.section); }
      map.get(t.section).push(t);
    }

    container.innerHTML = '';
    for (const name of order) {
      const section = document.createElement('div');
      section.className = 'section';
      section.dataset.section = name;
      section.innerHTML = `<div class="section-header">${escapeHtml(name)}</div>`;
      for (const t of map.get(name)) {
        const label = document.createElement('label');
        label.className = 'task' + (t.completed ? ' done' : '');
        label.draggable = true;
        label.dataset.id = t.id;
        const inner = t.html ? t.html : escapeHtml(t.text);
        label.innerHTML =
          `<span class="drag-handle" aria-hidden="true">⋮⋮</span>` +
          `<span class="checkbox"><input type="checkbox" ${t.completed ? 'checked' : ''}><span class="checkbox-visual"></span></span>` +
          `<span class="task-text">${inner}</span>` +
          `<button class="task-delete" title="Delete" aria-label="Delete task">&times;</button>`;
        section.appendChild(label);
      }
      container.appendChild(section);
    }

    wireTasks();
    renderSectionChips();
    updateProgress();
  }

  // ─── Task interactions ──────────────────────────────────────
  function wireTasks() {
    document.querySelectorAll('.task').forEach(el => {
      const id = el.dataset.id;
      const cb = el.querySelector('input[type="checkbox"]');
      cb.addEventListener('change', e => {
        e.stopPropagation();
        toggleTask(id, cb.checked);
      });
      const del = el.querySelector('.task-delete');
      del.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        deleteTask(id);
      });
      // Links inside tasks shouldn't bubble the click to the label
      el.querySelectorAll('.task-text a').forEach(a => {
        a.addEventListener('click', ev => ev.stopPropagation());
      });
      // Drag
      el.addEventListener('dragstart', handleDragStart);
      el.addEventListener('dragover', handleDragOver);
      el.addEventListener('dragleave', handleDragLeave);
      el.addEventListener('drop', handleDrop);
      el.addEventListener('dragend', handleDragEnd);
    });
  }

  function toggleTask(id, checked) {
    const tasks = loadTasks();
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    t.completed = checked;
    if (checked) {
      t.completedAt = new Date().toISOString();
      archiveAdd(t);
    } else {
      archiveRemoveLatestMatch(t);
      delete t.completedAt;
    }
    saveTasks(tasks);
    // Update DOM without full re-render so the checkbox animation plays
    const el = document.querySelector(`.task[data-id="${id}"]`);
    if (el) el.classList.toggle('done', checked);
    updateProgress();
  }

  function deleteTask(id) {
    const tasks = loadTasks();
    const idx = tasks.findIndex(x => x.id === id);
    if (idx === -1) return;
    tasks.splice(idx, 1);
    saveTasks(tasks);
    render();
  }

  // ─── Drag & drop reorder ────────────────────────────────────
  let draggedId = null;
  function handleDragStart(e) {
    draggedId = this.dataset.id;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', draggedId); } catch(err) {}
  }
  function handleDragOver(e) {
    if (!draggedId || draggedId === this.dataset.id) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = this.getBoundingClientRect();
    const above = e.clientY < rect.top + rect.height / 2;
    this.classList.toggle('drop-above', above);
    this.classList.toggle('drop-below', !above);
  }
  function handleDragLeave() {
    this.classList.remove('drop-above', 'drop-below');
  }
  function handleDrop(e) {
    e.preventDefault();
    if (!draggedId || draggedId === this.dataset.id) { handleDragEnd.call(this); return; }
    const targetId = this.dataset.id;
    const rect = this.getBoundingClientRect();
    const before = e.clientY < rect.top + rect.height / 2;
    reorderTask(draggedId, targetId, before);
    this.classList.remove('drop-above', 'drop-below');
  }
  function handleDragEnd() {
    document.querySelectorAll('.dragging, .drop-above, .drop-below')
      .forEach(el => el.classList.remove('dragging', 'drop-above', 'drop-below'));
    draggedId = null;
  }
  function reorderTask(dragId, targetId, before) {
    const tasks = loadTasks();
    const dragIdx = tasks.findIndex(t => t.id === dragId);
    if (dragIdx === -1) return;
    const [dragged] = tasks.splice(dragIdx, 1);
    const targetIdx = tasks.findIndex(t => t.id === targetId);
    if (targetIdx === -1) return;
    // If dropped across sections, adopt the target's section
    dragged.section = tasks[targetIdx].section;
    tasks.splice(before ? targetIdx : targetIdx + 1, 0, dragged);
    saveTasks(tasks);
    render();
  }

  // ─── Add task form ──────────────────────────────────────────
  let pendingSection = null; // string, or '__new__'
  function getSections() {
    const tasks = loadTasks();
    const seen = new Set();
    const out = [];
    for (const t of tasks) {
      if (!seen.has(t.section)) { seen.add(t.section); out.push(t.section); }
    }
    return out;
  }
  function renderSectionChips() {
    const sections = getSections();
    if (!pendingSection || (pendingSection !== '__new__' && !sections.includes(pendingSection))) {
      pendingSection = sections[0] || '__new__';
    }
    const host = document.getElementById('addTaskSections');
    host.innerHTML = '';
    sections.forEach(name => {
      const b = document.createElement('button');
      b.className = 'section-chip' + (pendingSection === name ? ' active' : '');
      b.textContent = name;
      b.onclick = () => { pendingSection = name; document.getElementById('addTaskNewSection').style.display = 'none'; renderSectionChips(); updateSubmitState(); };
      host.appendChild(b);
    });
    const nb = document.createElement('button');
    nb.className = 'section-chip new' + (pendingSection === '__new__' ? ' active' : '');
    nb.textContent = '+ New';
    nb.onclick = () => {
      pendingSection = '__new__';
      const ns = document.getElementById('addTaskNewSection');
      ns.style.display = 'block';
      renderSectionChips();
      setTimeout(() => ns.focus(), 0);
      updateSubmitState();
    };
    host.appendChild(nb);
  }
  function updateSubmitState() {
    const taskVal = document.getElementById('addTaskInput').value.trim();
    const newSecVal = document.getElementById('addTaskNewSection').value.trim();
    const ok = taskVal && (pendingSection !== '__new__' || newSecVal);
    document.getElementById('addTaskSubmit').disabled = !ok;
  }
  function submitNewTask() {
    const input = document.getElementById('addTaskInput');
    const newSecInput = document.getElementById('addTaskNewSection');
    const text = input.value.trim();
    if (!text) return;
    let section;
    if (pendingSection === '__new__') {
      section = newSecInput.value.trim();
      if (!section) return;
    } else {
      section = pendingSection;
    }
    const tasks = loadTasks();
    tasks.push({ id: genId(), text, section, completed: false });
    saveTasks(tasks);
    input.value = '';
    newSecInput.value = '';
    newSecInput.style.display = 'none';
    pendingSection = section; // stay on the section we just added to
    render();
    updateSubmitState();
    input.focus();
  }
  document.getElementById('addTaskInput').addEventListener('input', updateSubmitState);
  document.getElementById('addTaskNewSection').addEventListener('input', updateSubmitState);
  document.getElementById('addTaskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitNewTask(); }
  });
  document.getElementById('addTaskNewSection').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitNewTask(); }
  });
  document.getElementById('addTaskSubmit').addEventListener('click', submitNewTask);

  // ─── Progress ──────────────────────────────────────────────
  function updateProgress() {
    const tasks = loadTasks();
    const total = tasks.length;
    const done = tasks.filter(t => t.completed).length;
    const pct = total ? (done / total) * 100 : 0;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('stats').textContent = `${done} / ${total}`;
    document.getElementById('pct').textContent = `${Math.round(pct)}%`;
  }

  function resetAll() {
    if (!confirm('Reset all tasks?')) return;
    const tasks = loadTasks();
    tasks.forEach(t => { t.completed = false; delete t.completedAt; });
    saveTasks(tasks);
    render();
  }

  // ─── Archive ────────────────────────────────────────────────
  function loadArchive() {
    try {
      const raw = localStorage.getItem(ARCHIVE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }
  function saveArchive(entries) {
    try { localStorage.setItem(ARCHIVE_KEY, JSON.stringify(entries)); } catch(e) {}
  }
  function archiveAdd(task) {
    const entries = loadArchive();
    entries.push({
      id: genId(),
      text: task.text,
      section: task.section,
      completedAt: task.completedAt || new Date().toISOString()
    });
    saveArchive(entries);
  }
  function archiveRemoveLatestMatch(task) {
    const entries = loadArchive();
    for (let i = entries.length - 1; i >= 0; i--) {
      if (entries[i].text === task.text) {
        entries.splice(i, 1);
        saveArchive(entries);
        return;
      }
    }
  }

  function formatDayLabel(iso) {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    const sameDay = (a, b) => a.toDateString() === b.toDateString();
    if (sameDay(d, today)) return 'Today';
    if (sameDay(d, yesterday)) return 'Yesterday';
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: d.getFullYear() === today.getFullYear() ? undefined : 'numeric' });
  }
  function dayKey(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function renderArchive() {
    const body = document.getElementById('archiveBody');
    const summary = document.getElementById('archiveSummary');
    const count = document.getElementById('archiveCount');
    const filter = document.getElementById('archiveSearch').value.trim().toLowerCase();

    const entries = loadArchive()
      .filter(e => !filter || e.text.toLowerCase().includes(filter) || (e.section || '').toLowerCase().includes(filter))
      .sort((a, b) => b.completedAt.localeCompare(a.completedAt));

    // Summary counts (always over the full archive, not filtered)
    const all = loadArchive();
    const now = Date.now();
    const WEEK = 7 * 24 * 60 * 60 * 1000;
    const thisWeek = all.filter(e => now - new Date(e.completedAt).getTime() < WEEK).length;
    const thisMonth = all.filter(e => {
      const d = new Date(e.completedAt);
      const t = new Date();
      return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth();
    }).length;
    summary.textContent = `${thisWeek} this week · ${thisMonth} this month · ${all.length} all-time`;
    count.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}${filter ? ' matching' : ''}`;

    if (!entries.length) {
      body.innerHTML = `<div class="archive-empty">${filter ? 'No matches.' : 'Nothing here yet. Check a task to start your history.'}</div>`;
      return;
    }

    // Group by day
    const groups = new Map();
    for (const e of entries) {
      const k = dayKey(e.completedAt);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(e);
    }

    const escape = s => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let html = '';
    for (const [, list] of groups) {
      html += `<div class="archive-day"><div class="archive-day-label">${escape(formatDayLabel(list[0].completedAt))}</div>`;
      for (const e of list) {
        html += `<div class="archive-entry"><div class="archive-entry-text">${escape(e.text)}</div>${e.section ? `<div class="archive-entry-section">${escape(e.section)}</div>` : ''}</div>`;
      }
      html += '</div>';
    }
    body.innerHTML = html;
  }

  function openArchive() {
    renderArchive();
    document.getElementById('archiveOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('archiveSearch').focus(), 50);
  }
  function closeArchive() {
    document.getElementById('archiveOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('archiveSearch').addEventListener('input', renderArchive);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeArchive();
  });

  function exportArchive() {
    const entries = loadArchive();
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `the-list-archive-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  function clearArchive() {
    if (!confirm('Delete all archive entries? This cannot be undone. (Tip: export first.)')) return;
    saveArchive([]);
    renderArchive();
  }

  // Expose for inline handlers
  window.openArchive = openArchive;
  window.closeArchive = closeArchive;
  window.exportArchive = exportArchive;
  window.clearArchive = clearArchive;
  window.resetAll = resetAll;

  // Initial render (must be last — depends on all handlers being defined)
  render();
</script>
</body>
</html>
