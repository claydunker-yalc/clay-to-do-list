<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The List</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b6b6b;
    --faint: #a3a3a3;
    --hairline: #e7e5e4;
    --subtle: #f5f4f2;
  }
  :root[data-theme="dark"] {
    --bg: #0a0a0a;
    --surface: #141414;
    --ink: #fafafa;
    --muted: #a3a3a3;
    --faint: #6b6b6b;
    --hairline: #262626;
    --subtle: #1c1c1c;
  }
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .container {
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 200;
    font-size: 16px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--ink);
    padding: 4rem 1.25rem 6rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container {
    position: relative;
    max-width: 580px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 24px;
    padding: 3.5rem 3rem;
  }
  .theme-toggle {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--hairline);
    color: var(--faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .theme-toggle:hover {
    color: var(--ink);
    border-color: var(--muted);
  }
  .theme-toggle svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.25;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .theme-toggle .icon-moon { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  @media (max-width: 520px) {
    body { padding: 2rem 0.75rem 4rem; }
    .container { padding: 2.25rem 1.5rem; border-radius: 20px; }
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  h1 {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 2.75rem;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }
  .subtitle {
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .progress {
    margin: 0 0 2.75rem;
  }
  .progress-bar {
    height: 2px;
    background: var(--hairline);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 0.65rem;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
  }

  .section {
    margin-bottom: 2.25rem;
  }
  .section:last-of-type {
    margin-bottom: 0;
  }
  .section-header {
    font-family: "DM Serif Display", Georgia, serif;
    font-weight: 400;
    font-size: 1.25rem;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: -0.005em;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 0.9rem;
    padding: 0.7rem 0.5rem;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.18s ease;
  }
  .task:hover {
    background: var(--subtle);
  }

  .checkbox {
    position: relative;
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 0.15rem;
  }
  .task input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    cursor: pointer;
  }
  .checkbox-visual {
    position: absolute;
    inset: 0;
    border: 1px solid var(--faint);
    border-radius: 50%;
    background: var(--surface);
    transition: all 0.2s ease;
  }
  .checkbox-visual::after {
    content: "";
    position: absolute;
    top: 4px;
    left: 3px;
    width: 10px;
    height: 5px;
    border-left: 1.5px solid var(--surface);
    border-bottom: 1.5px solid var(--surface);
    transform: rotate(-45deg) scale(0);
    transition: transform 0.2s ease;
  }
  .task:hover .checkbox-visual {
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual {
    background: var(--ink);
    border-color: var(--ink);
  }
  .task input[type="checkbox"]:checked + .checkbox-visual::after {
    transform: rotate(-45deg) scale(1);
  }

  .task-text {
    flex: 1;
    font-weight: 300;
    font-size: 0.975rem;
    color: var(--ink);
    line-height: 1.45;
    transition: color 0.2s ease;
  }
  .task.done .task-text {
    color: var(--faint);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
    text-decoration-color: var(--faint);
  }

  .note {
    font-size: 0.78rem;
    font-style: italic;
    color: var(--muted);
    margin-left: 0.35rem;
    font-weight: 300;
  }

  .task-text a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    text-decoration-color: var(--muted);
    font-weight: 400;
    transition: text-decoration-color 0.15s ease;
  }
  .task-text a:hover {
    text-decoration-color: var(--ink);
  }
  .task.done .task-text a {
    color: var(--faint);
    text-decoration-color: var(--faint);
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--hairline);
    display: flex;
    justify-content: center;
  }
  .reset-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .reset-btn:hover {
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="container">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </svg>
  </button>
  <div class="header">
    <h1>The List</h1>
    <div class="subtitle" id="date"></div>
  </div>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="progress-meta">
      <span id="stats">0 / 13</span>
      <span id="pct">0%</span>
    </div>
  </div>

  <div class="section">
    <div class="section-header">Do Today</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Deposit Q.T. check</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Ruben Hassid Claude Design tutorial</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Prepare documents for CU meeting</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Order classroom supplies for next year</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">$2k to Kristi Crook ($1k from her biggest and one from Mer&rsquo;s)</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Instructions for Gma and Gpa B</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">$300 to Andrea Dunlap</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Salary bands for NEA dues</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Hamburger doesn&rsquo;t work on Nikki&rsquo;s site</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Pay IRS</span></label>
  </div>

  <div class="section">
    <div class="section-header">Next Week &amp; Follow-ups</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Job description handoff interview</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Clay-Mate MCP searchable dashboard</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Review <a href="https://docs.google.com/forms/d/1dhce8ibBCnBtYm0WOzgEElm5Q6oozsLadivq3UEBdc4/edit" target="_blank" rel="noopener" onclick="event.stopPropagation()">AI Survey first draft</a>, share with Adam</span></label>
  </div>

  <div class="section">
    <div class="section-header">Low Priority</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Socratic method prompt</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Claude Design study &mdash; sites I like</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">AI Cred assessment retake</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">MagicWalk app</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Flummoxing Flags app</span></label>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Compare Chalkie vs. Diffit vs. Brisk</span></label>
  </div>

  <div class="section">
    <div class="section-header">Sometime Later</div>
    <label class="task"><span class="checkbox"><input type="checkbox"><span class="checkbox-visual"></span></span><span class="task-text">Change battery on mom&rsquo;s mower</span></label>
  </div>

  <div class="footer">
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'clay-todo-v6';
  const THEME_KEY = 'clay-todo-theme';

  (function initTheme() {
    let theme;
    try { theme = localStorage.getItem(THEME_KEY); } catch(e) {}
    if (!theme) {
      theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem(THEME_KEY, next); } catch(e) {}
  });

  document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  const checkboxes = document.querySelectorAll('.task input[type="checkbox"]');

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    checkboxes.forEach((cb, i) => {
      if (saved[i] !== undefined) {
        cb.checked = saved[i];
        cb.closest('.task').classList.toggle('done', cb.checked);
      }
    });
  } catch(e) {}

  function saveState() {
    const state = Array.from(checkboxes).map(cb => cb.checked);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  function updateProgress() {
    const total = checkboxes.length;
    const done = Array.from(checkboxes).filter(cb => cb.checked).length;
    const pct = total ? (done / total) * 100 : 0;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('stats').textContent = `${done} / ${total}`;
    document.getElementById('pct').textContent = `${Math.round(pct)}%`;
  }

  checkboxes.forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.task').classList.toggle('done', cb.checked);
      saveState();
      updateProgress();
    });
  });

  function resetAll() {
    if (!confirm('Reset all tasks?')) return;
    checkboxes.forEach(cb => {
      cb.checked = false;
      cb.closest('.task').classList.remove('done');
    });
    saveState();
    updateProgress();
  }

  updateProgress();
</script>
</body>
</html>
